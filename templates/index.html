<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COPIUM // terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #33ff33;
      font-family: "Courier New", Courier, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .terminal {
      width: 100%;
      max-width: 800px;
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid #33ff33;
      box-shadow: 0 0 12px rgba(51, 255, 51, 0.3);
    }

    .titlebar {
      border-bottom: 1px solid #33ff33;
      padding: 8px 12px;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #33ff33;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .msg { margin-bottom: 10px; white-space: pre-wrap; word-wrap: break-word; }
    .msg .tag { font-weight: bold; }
    .msg.user { color: #33ff33; }
    .msg.user .tag { color: #00cc00; }
    .msg.bot { color: #ffbf00; }
    .msg.bot .tag { color: #ff9900; }
    .msg.error { color: #ff4444; }
    .msg.error .tag { color: #ff0000; }

    .inputbar {
      display: flex;
      border-top: 1px solid #33ff33;
    }

    .inputbar .prompt-char {
      padding: 10px 0 10px 12px;
      color: #33ff33;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #33ff33;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 8px;
      caret-color: #33ff33;
    }

    #send {
      background: transparent;
      border: none;
      border-left: 1px solid #33ff33;
      color: #33ff33;
      font-family: inherit;
      font-size: 14px;
      padding: 10px 16px;
      cursor: pointer;
    }

    #send:hover { background: #33ff33; color: #000; }
    #send:disabled { opacity: 0.4; cursor: wait; }

    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: #33ff33; }
    #chat::-webkit-scrollbar-track { background: #111; }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">COPIUM v1.0 — crypto twitter terminal — type 'gm' to start</div>
    <div id="chat">
      <div class="msg bot"><span class="tag">[COPIUM]</span> gm ser. wagmi. preguntame lo que quieras, fren (not financial advice, obvio)</div>
    </div>
    <div class="inputbar">
      <span class="prompt-char">&gt;</span>
      <input id="input" type="text" autocomplete="off" autofocus placeholder="escribí acá, anon..." />
      <button id="send">send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = role === "user" ? "[anon] " : role === "bot" ? "[COPIUM] " : "[ERROR] ";
      div.appendChild(tag);
      div.appendChild(document.createTextNode(text));
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      input.value = "";
      sendBtn.disabled = true;
      input.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          addMessage("error", data.error || "algo se rompió, ngmi");
        } else {
          addMessage("bot", data.reply);
        }
      } catch (err) {
        addMessage("error", "no pude conectar con el server: " + err.message);
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
